# Example: serve apps/app2 on http://localhost:8081
# Useful when you don't want to mess with /etc/hosts. Just publish another
# port from the nginx service in docker-compose.yml (e.g. "8081:8081") and
# this server block will pick it up.

server {
    listen 8081;
    listen [::]:8081;
    server_name localhost;

    root /var/www/apps/app2/public;
    index index.php index.html;

    charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
