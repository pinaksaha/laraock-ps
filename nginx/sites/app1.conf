# Example: serve apps/app1 on http://app1.localhost (port 80)
# Add `127.0.0.1 app1.localhost` to your /etc/hosts file, OR change
# `server_name` to localhost and use a different `listen` port.

server {
    listen 80;
    listen [::]:80;
    server_name app1.localhost;

    root /var/www/apps/app1/public;
    index index.php index.html;

    charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
    }

    # Block access to dotfiles (except /.well-known) and Laravel internals.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
