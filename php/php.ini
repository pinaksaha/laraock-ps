; Custom PHP configuration applied on top of the upstream defaults.
; This file is mounted at /usr/local/etc/php/conf.d/zz-custom.ini

memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
max_input_time = 300
max_input_vars = 5000
date.timezone = UTC

; OPcache — keep validate_timestamps on for development. Set to 0 in prod.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1
opcache.fast_shutdown = 1

; Logging
log_errors = On
error_log = /var/log/php/php-error.log
display_errors = Off

; Session storage in Redis (per-app .env still wins; this is a sane default)
session.gc_maxlifetime = 7200
