# Minimal Redis config. Each Laravel app should use a different REDIS_DB index
# in its .env (e.g. app1 -> 0, app2 -> 1) so they don't collide.

bind 0.0.0.0
protected-mode no
port 6379

# Persistence
appendonly yes
appendfsync everysec

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
